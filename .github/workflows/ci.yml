name: CI

on:
  push:
    branches:
      - staging
    paths-ignore:
      - 'docs/**'
      - '**.md'
      - '.gitignore'
      - 'LICENSE'
      - 'SECURITY.md'

jobs:
  secret-scan:
    name: Secret Scan (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  lint-python:
    name: Lint Python (vote)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install linters
        run: pip install flake8 ruff
      - name: Flake8
        run: flake8 vote/ --max-line-length=120
      - name: Ruff
        run: ruff check vote/

  lint-js:
    name: Lint JavaScript (result)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: '18'
      - name: Install dependencies
        run: npm ci
        working-directory: result
      - name: ESLint
        run: npm run lint
        working-directory: result

  lint-dotnet:
    name: Lint .NET (worker)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: dotnet format
        run: dotnet format --verify-no-changes
        working-directory: worker

  build-and-scan:
    name: Build & Scan (${{ matrix.service }})
    needs: [secret-scan, lint-python, lint-js, lint-dotnet]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [vote, result, worker]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.service }}
          push: false
          load: true
          tags: ghcr.io/neyamatullah/${{ matrix.service }}:${{ github.sha }}
      - name: Trivy scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ghcr.io/neyamatullah/${{ matrix.service }}:${{ github.sha }}
          format: table
          exit-code: '1'
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          trivyignores: .trivyignore

  push:
    name: Push to GHCR (${{ matrix.service }})
    needs: build-and-scan
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      packages: write
    strategy:
      matrix:
        service: [vote, result, worker]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - name: Build & push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.service }}
          push: true
          tags: |
            ghcr.io/neyamatullah/${{ matrix.service }}:latest
            ghcr.io/neyamatullah/${{ matrix.service }}:${{ github.sha }}

  sign:
    name: Sign image (${{ matrix.service }})
    needs: push
    runs-on: ubuntu-latest
    permissions:
      packages: write
      id-token: write
    strategy:
      matrix:
        service: [vote, result, worker]
    steps:
      - uses: sigstore/cosign-installer@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Sign ${{ matrix.service }}
        env:
          COSIGN_EXPERIMENTAL: "true"
        run: |
          cosign sign --yes \
            ghcr.io/neyamatullah/${{ matrix.service }}:${{ github.sha }}
