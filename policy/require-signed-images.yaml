apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-signed-images
  annotations:
    policies.kyverno.io/title: Require Cosign-Signed Images
    policies.kyverno.io/description: >-
      Every image pushed from CI is signed with Cosign keyless signing via GitHub OIDC.
      This policy verifies the signature at admission time so tampered or unsigned
      images cannot be scheduled. Only applies to ghcr.io/neyamatullah/* images.
spec:
  validationFailureAction: Audit
  background: false
  rules:
    - name: check-image-signature
      match:
        any:
          - resources:
              kinds:
                - Pod
      verifyImages:
        - imageReferences:
            - "ghcr.io/neyamatullah/*"
          attestors:
            - entries:
                - keyless:
                    subject: "https://github.com/NeyamatUllah/*"
                    issuer: "https://token.actions.githubusercontent.com"
