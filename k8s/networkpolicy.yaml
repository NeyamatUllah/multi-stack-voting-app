---
# db only accepts connections from worker and result — vote is implicitly denied
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: db-ingress-policy
spec:
  podSelector:
    matchLabels:
      app: db
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: worker
        - podSelector:
            matchLabels:
              app: result
---
# vote may only reach redis (and DNS); all other egress blocked
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: vote-egress-policy
spec:
  podSelector:
    matchLabels:
      app: vote
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: redis
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
