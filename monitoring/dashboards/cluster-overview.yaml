apiVersion: v1
kind: ConfigMap
metadata:
  name: dashboard-cluster-overview
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  cluster-overview.json: |
    {
      "title": "Cluster Overview",
      "uid": "cluster-overview",
      "version": 1,
      "schemaVersion": 36,
      "refresh": "30s",
      "time": {"from": "now-1h", "to": "now"},
      "panels": [
        {
          "id": 1,
          "title": "CPU Usage by Pod (default ns)",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 0},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "prometheus"},
              "expr": "sum(rate(container_cpu_usage_seconds_total{namespace=\"default\", container!=\"\"}[5m])) by (pod)",
              "legendFormat": "{{pod}}"
            }
          ],
          "options": {},
          "fieldConfig": {"defaults": {"unit": "cores"}, "overrides": []}
        },
        {
          "id": 2,
          "title": "Memory Usage by Pod (default ns)",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 0},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "prometheus"},
              "expr": "sum(container_memory_usage_bytes{namespace=\"default\", container!=\"\"}) by (pod)",
              "legendFormat": "{{pod}}"
            }
          ],
          "options": {},
          "fieldConfig": {"defaults": {"unit": "bytes"}, "overrides": []}
        },
        {
          "id": 3,
          "title": "Pod Restart Count (all)",
          "type": "bargauge",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 8},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "prometheus"},
              "expr": "sum(kube_pod_container_status_restarts_total{namespace=\"default\"}) by (pod)",
              "legendFormat": "{{pod}}"
            }
          ],
          "options": {"orientation": "horizontal", "reduceOptions": {"calcs": ["lastNotNull"]}},
          "fieldConfig": {"defaults": {"unit": "short"}, "overrides": []}
        },
        {
          "id": 4,
          "title": "Ready Pods per Deployment",
          "type": "stat",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 8},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "prometheus"},
              "expr": "kube_deployment_status_replicas_available{namespace=\"default\"}",
              "legendFormat": "{{deployment}}"
            }
          ],
          "options": {"reduceOptions": {"calcs": ["lastNotNull"]}, "colorMode": "background"},
          "fieldConfig": {
            "defaults": {"unit": "short", "thresholds": {"mode": "absolute", "steps": [{"color": "red", "value": 0}, {"color": "green", "value": 1}]}},
            "overrides": []
          }
        }
      ]
    }
