apiVersion: v1
kind: ConfigMap
metadata:
  name: dashboard-vote-throughput
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  vote-throughput.json: |
    {
      "title": "Vote Throughput",
      "uid": "vote-throughput",
      "version": 1,
      "schemaVersion": 36,
      "refresh": "30s",
      "time": {"from": "now-1h", "to": "now"},
      "panels": [
        {
          "id": 1,
          "title": "Requests per Second",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 0},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "prometheus"},
              "expr": "sum(rate(flask_http_request_total[1m])) by (status)",
              "legendFormat": "HTTP {{status}}"
            }
          ],
          "options": {"tooltip": {"mode": "multi"}},
          "fieldConfig": {"defaults": {"unit": "reqps"}, "overrides": []}
        },
        {
          "id": 2,
          "title": "5xx Error Rate",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 0},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "prometheus"},
              "expr": "rate(flask_http_request_total{status=~\"5..\"}[1m]) / rate(flask_http_request_total[1m])",
              "legendFormat": "error rate"
            }
          ],
          "options": {},
          "fieldConfig": {"defaults": {"unit": "percentunit", "max": 1}, "overrides": []}
        },
        {
          "id": 3,
          "title": "Request Latency p50 / p95",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 24, "x": 0, "y": 8},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "prometheus"},
              "expr": "histogram_quantile(0.50, rate(flask_http_request_duration_seconds_bucket[5m]))",
              "legendFormat": "p50"
            },
            {
              "datasource": {"type": "prometheus", "uid": "prometheus"},
              "expr": "histogram_quantile(0.95, rate(flask_http_request_duration_seconds_bucket[5m]))",
              "legendFormat": "p95"
            }
          ],
          "options": {},
          "fieldConfig": {"defaults": {"unit": "s"}, "overrides": []}
        }
      ]
    }
