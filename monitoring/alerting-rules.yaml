apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: voting-app-rules
  namespace: monitoring
  labels:
    release: kube-prometheus-stack
spec:
  groups:
    - name: voting-app
      rules:
        - alert: WorkerDown
          expr: kube_deployment_status_replicas_available{namespace="default",deployment="worker"} == 0
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "Worker deployment has no available replicas"
            description: "The worker deployment in namespace {{ $labels.namespace }} has 0 available replicas for 2 minutes."

        - alert: VoteHighErrorRate
          expr: >
            rate(flask_http_request_total{status=~"5.."}[1m])
            /
            rate(flask_http_request_total[1m])
            > 0.05
          for: 1m
          labels:
            severity: warning
          annotations:
            summary: "Vote service 5xx error rate above 5%"
            description: "Vote service is returning {{ $value | humanizePercentage }} 5xx errors."

        - alert: RedisQueueBacklog
          expr: redis_list_length{key="votes"} > 100
          for: 2m
          labels:
            severity: warning
          annotations:
            summary: "Redis votes queue backlog is high"
            description: "Redis 'votes' list has {{ $value }} items — worker may be falling behind."

        - alert: DBConnectionsHigh
          expr: pg_stat_activity_count > 80
          for: 2m
          labels:
            severity: warning
          annotations:
            summary: "PostgreSQL active connections above 80"
            description: "{{ $value }} active PostgreSQL connections detected."
