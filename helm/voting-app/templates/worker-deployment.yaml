apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  labels:
    {{- include "voting-app.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.worker.replicas }}
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
      {{- if .Values.vault.enabled }}
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "{{ .Values.vault.role }}"
        vault.hashicorp.com/agent-inject-secret-db: "{{ .Values.vault.secretPath }}"
        vault.hashicorp.com/agent-inject-template-db: |
          {{ "{{" }}- with secret "{{ .Values.vault.secretPath }}" -{{ "}}" }}
          DB_USERNAME={{ "{{" }} .Data.data.username {{ "}}" }}
          DB_PASSWORD={{ "{{" }} .Data.data.password {{ "}}" }}
          DB_NAME={{ "{{" }} .Data.data.dbname {{ "}}" }}
          {{ "{{" }}- end {{ "}}" }}
      {{- end }}
    spec:
      serviceAccountName: worker
      containers:
        - name: worker
          image: {{ .Values.worker.image.repository }}:{{ .Values.worker.image.tag }}
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
          env:
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: REDIS_HOST
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: DB_HOST
            {{- if not .Values.vault.enabled }}
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: POSTGRES_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: POSTGRES_PASSWORD
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: POSTGRES_DB
            {{- end }}
          resources:
            {{- toYaml .Values.worker.resources | nindent 12 }}
          readinessProbe:
            exec:
              command: ["/bin/sh", "-c", "kill -0 1"]
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["/bin/sh", "-c", "kill -0 1"]
            initialDelaySeconds: 30
            periodSeconds: 15
