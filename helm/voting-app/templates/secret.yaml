apiVersion: v1
kind: Secret
metadata:
  name: db-credentials
  labels:
    {{- include "voting-app.labels" . | nindent 4 }}
type: Opaque
stringData:
  POSTGRES_USER: {{ .Values.db.credentials.user | quote }}
  POSTGRES_PASSWORD: {{ .Values.db.credentials.password | quote }}
  POSTGRES_DB: {{ .Values.db.credentials.name | quote }}
